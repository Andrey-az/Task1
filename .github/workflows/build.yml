name: Build EXE

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build EXE
      run: |
        pyinstaller --onefile --windowed -n MaterialApp app.py

    - name: Upload EXE
      uses: actions/upload-artifact@v3
      with:
        name: MaterialApp
        path: dist/MaterialApp.exe
